<head>
  <link href="https://gmpg.org/xfn/11" rel="profile">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta http-equiv="content-type" content="text/html; charset=utf-8">

  <!-- Enable responsiveness on mobile devices-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

  <title>
    {{- if .IsHome -}}
      {{ site.Title }} &middot; {{ site.Params.tagline }}
    {{- else -}}
      {{ .Title }} &middot; {{ site.Title }}
    {{- end -}}
  </title>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ "public/css/poole.css" | relURL }}">
  <link rel="stylesheet" href="{{ "public/css/syntax.css" | relURL }}">
  <link rel="stylesheet" href="{{ "public/css/syntax.jekyll.css" | relURL }}">
  <link rel="stylesheet" href="{{ "public/css/hyde.css" | relURL }}">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=PT+Sans:400,400italic,700|Abril+Fatface">
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700" rel="stylesheet" type="text/css">
  <link rel="stylesheet" href="{{ "public/css/custom.css" | relURL }}">

  <!-- Icons -->
  <link rel="apple-touch-icon-precomposed" sizes="144x144" href="{{ "public/apple-touch-icon-144-precomposed.png" | relURL }}">
  <link rel="shortcut icon" href="{{ "public/favicon.ico" | relURL }}">

  <!-- RSS -->
  <link rel="alternate" type="application/atom+xml" title="RSS" href="{{ "atom.xml" | relURL }}">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.8.1/css/lightbox.css">

  <!-- Google Analytics 4 (production builds only) -->
  {{ if hugo.IsProduction }}{{ template "_internal/google_analytics.html" . }}{{ end }}

</head>
